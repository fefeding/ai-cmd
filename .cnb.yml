# CNB 云构建配置
# 文档: https://docs.cnb.cool/zh/build/grammar.html

# main 分支: 推送时构建
main:
  push:
    - name: build-electron-client
      docker:
        image: node:20
        volumes:
          - pnpm-store:/root/.local/share/pnpm/store/v3:rw
      env:
        ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        CI: 'true'
      stages:
        - name: install pnpm
          script: npm i -g pnpm

        - name: install dependencies
          script: pnpm install --no-frozen-lockfile

        - name: build application
          script: pnpm run build

        - name: prepare dist dependencies
          script: |
            cp package.json dist/package.json
            cd dist && npm install --omit=dev --no-audit --no-fund

        - name: build electron linux client
          script: pnpm run electron:build -- --platform=linux

        - name: package artifacts
          script: |
            mkdir -p artifacts
            if [ -d "release/linux-unpacked" ]; then
              tar -czf artifacts/aicmd-linux.tar.gz -C release/linux-unpacked .
            fi
            echo "=== 构建产物 ==="
            find release -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.AppImage" -o -name "*.dmg" \) 2>/dev/null | head -20 || true
            ls -la release/ 2>/dev/null || true
            echo "=== artifacts ==="
            ls -la artifacts/ 2>/dev/null || true

      endStages:
        - name: show build summary
          script: |
            echo "✅ 构建完成"
            echo "分支: ${CNB_BRANCH}"
            echo "提交: ${CNB_COMMIT}"
            echo "构建产物目录: release/"
            find release -maxdepth 2 -type d 2>/dev/null || true

# tag 推送时构建（用于发布版本）
$:
  tag_push:
    - name: build-electron-release
      docker:
        image: node:20
        volumes:
          - pnpm-store:/root/.local/share/pnpm/store/v3:rw
      env:
        ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        CI: 'true'
      stages:
        - name: install pnpm
          script: npm i -g pnpm

        - name: install dependencies
          script: pnpm install --no-frozen-lockfile

        - name: build application
          script: pnpm run build

        - name: prepare dist dependencies
          script: |
            cp package.json dist/package.json
            cd dist && npm install --omit=dev --no-audit --no-fund

        - name: build electron linux client
          script: pnpm run electron:build -- --platform=linux

        - name: package artifacts
          script: |
            mkdir -p artifacts
            if [ -d "release/linux-unpacked" ]; then
              tar -czf artifacts/aicmd-linux.tar.gz -C release/linux-unpacked .
            fi
            echo "=== 构建产物 ==="
            find release -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.AppImage" -o -name "*.dmg" \) 2>/dev/null | head -20 || true
            ls -la release/ 2>/dev/null || true
            echo "=== artifacts ==="
            ls -la artifacts/ 2>/dev/null || true

      endStages:
        - name: show release summary
          script: |
            echo "✅ 发布构建完成"
            echo "标签: ${CNB_BRANCH}"
            echo "分支: ${CNB_BRANCH}"
            echo "提交: ${CNB_COMMIT}"